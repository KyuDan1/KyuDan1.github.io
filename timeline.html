<html lang="en">
<head>

<title>Kyudan Jung — AI Research Timeline</title>

<style>
:root {
  --bg: #ffffff;
  --bg-card: #f8f9fb;
  --border: #e0e2e8;
  --text: #1a1a2e;
  --text-dim: #6b7080;
  --text-light: #9098a8;
  --col-cau: #2155A4;
  --col-kaist: #004187;
  --col-snu: #0F0F70;
  --col-nvidia: #76B900;
  --col-neowine: #7c6bc4;
  --col-krafton: #d19a66;
  --col-naver: #00C9B1;
  --col-qualcomm: #3253DC;
  --paper-top: #c8850a;
  --paper-misc: #888;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  text-align: center;
  padding: 48px 20px 16px;
}
.header h1 {
  font-size: 2rem;
  font-weight: 700;
  color: #1a1a2e;
}
.header p { color: var(--text-dim); margin-top: 6px; font-size: 0.92rem; font-weight: 300; }
.header .hint { color: var(--text-light); margin-top: 12px; font-size: 0.76rem; }

.legend {
  display: flex; justify-content: center; flex-wrap: wrap;
  gap: 14px; padding: 6px 20px 22px;
}
.legend-item { display:flex; align-items:center; gap:5px; font-size:0.73rem; color:var(--text-dim); }
.legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.legend-rect { width:16px; height:8px; border-radius:3px; flex-shrink:0; }

.timeline-wrapper {
  flex: 1; width: 100%; overflow-x: auto; overflow-y: auto;
  padding: 0 40px 60px;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: auto;
}
.timeline-wrapper::-webkit-scrollbar { height: 6px; width: 6px; }
.timeline-wrapper::-webkit-scrollbar-track { background: #f0f0f0; }
.timeline-wrapper::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 3px; }

.timeline-canvas { position: relative; }

.time-axis {
  position: absolute; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, #bbb 3%, #bbb 97%, transparent);
}

.year-marker {
  position: absolute; transform: translateX(-50%); text-align: center;
}
.year-marker .tick { width:1px; height:18px; background:#aaa; margin:0 auto; }
.year-marker .label {
  font-size:0.75rem; color:var(--text-dim); margin-top:5px;
  font-family:'JetBrains Mono',monospace; font-weight:500;
}
.quarter-marker {
  position:absolute; width:1px; height:6px; background:#ddd; transform:translateX(-50%);
}

/* Education backbone bars */
.edu-bar {
  position: absolute; height: 36px; border-radius: 6px;
  display: flex; align-items: center; padding: 0 16px;
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.3px;
  white-space: nowrap;
  color: #fff; z-index: 1; opacity: 0.92;
  cursor: default; overflow: visible;
}
.edu-bar > span:not(.bar-date) {
  overflow: hidden; text-overflow: ellipsis;
}

/* Experience bars */
.exp-bar {
  position: absolute; height: 36px; border-radius: 7px;
  cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  display: flex; align-items: center; padding: 0 12px;
  font-size: 0.68rem; font-weight: 600; letter-spacing: 0.2px;
  white-space: nowrap; overflow: visible;
  border: 1px solid transparent; z-index: 3; color: #fff;
}
.exp-bar > span:not(.bar-date) {
  overflow: hidden; text-overflow: ellipsis;
}
.exp-bar:hover { transform: translateY(-2px); z-index:10; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }

.bar-logo {
  height: 18px; width: auto; margin-right: 7px; flex-shrink: 0;
  filter: brightness(0) invert(1);
  object-fit: contain;
}
.bar-logo.logo-no-filter {
  filter: none;
}
.bar-logo.logo-sm {
  height: 13px;
}
.edu-bar .bar-logo {
  height: 20px; margin-right: 8px;
}

.bar-date {
  position: absolute; top: -16px;
  font-size: 0.58rem; font-family: 'JetBrains Mono', monospace;
  color: var(--text-dim); white-space: nowrap; font-weight: 500;
}
.bar-date.start { left: 0; }
.bar-date.end { right: 0; }

.paper-card {
  position: absolute; z-index: 4; cursor: pointer;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 10px; width: 175px;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  overflow: hidden;
}
.paper-card:hover {
  transform: translateY(2px); z-index: 20;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
}
.paper-card.top { border-left: 3px solid var(--paper-top); }
.paper-card.top:hover { border-color: var(--paper-top); }
.paper-card.misc { border-left: 3px solid var(--paper-misc); }
.paper-card.misc:hover { border-color: var(--paper-misc); }
.paper-card .pc-title {
  font-size: 0.64rem; font-weight: 600; line-height: 1.35;
  color: var(--text); display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.paper-card .pc-venue {
  font-size: 0.57rem; color: var(--text-dim); margin-top: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.paper-card.top .pc-venue { color: var(--paper-top); }

.paper-stem { position: absolute; width: 2px; z-index: 1; }

.connector { position: absolute; width: 1px; z-index: 1; }

/* Tooltip */
.tooltip {
  position: fixed; background: #fff; border: 1px solid #dde;
  border-radius: 10px; padding: 14px 18px; max-width: 400px;
  font-size: 0.82rem; line-height: 1.5; color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,0.12); pointer-events: none;
  opacity: 0; transition: opacity 0.15s; z-index: 100;
}
.tooltip.show { opacity: 1; }
.tooltip .tt-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; }
.tooltip .tt-org { color: var(--text-dim); font-size: 0.78rem; margin-bottom: 6px; }
.tooltip .tt-date { font-family:'JetBrains Mono',monospace; font-size:0.72rem; color:var(--text-dim); margin-bottom:6px; }
.tooltip .tt-desc { color: #555; font-size: 0.78rem; }
.tooltip .tt-paper-title { font-weight:600; font-size:0.85rem; margin-bottom:4px; }
.tooltip .tt-venue { font-size:0.75rem; color:var(--text-dim); margin-bottom:4px; }
.tooltip .tt-venue.top { color: var(--paper-top); }
.tooltip .tt-link { font-size:0.72rem; color:#2155A4; }
.tooltip .tt-tag {
  display:inline-block; padding:2px 8px; border-radius:4px;
  font-size:0.63rem; font-weight:600; text-transform:uppercase;
  letter-spacing:0.5px; margin-bottom:5px;
}
.tooltip .tt-tag.top { background:rgba(200,133,10,0.12); color:var(--paper-top); }
.tooltip .tt-tag.misc { background:rgba(136,136,136,0.12); color:var(--paper-misc); }

.row-label {
  position: absolute; left: 8px;
  font-size: 0.7rem; font-weight: 600; color: var(--text-dim);
  letter-spacing: 0.3px; white-space: nowrap;
}

.back-link {
  position:fixed; top:18px; left:18px; color:var(--text-dim);
  text-decoration:none; font-size:0.85rem; z-index:50; transition:color 0.2s;
}
.back-link:hover { color:var(--text); }

@media (max-width: 768px) {
  .header h1 { font-size: 1.4rem; }
  .timeline-wrapper { padding: 0 16px 40px; }
}
</style>
</head>

<div class="header">
  <h1>AI Research Timeline</h1>
  <p>Kyudan Jung &mdash; Research Experiences &amp; Publications</p>
  <div class="hint">Scroll horizontally &middot; Hover for details &middot; Click papers to open</div>

<div class="timeline-wrapper" id="timelineWrapper">
  <div class="timeline-canvas" id="timelineCanvas"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const START_YEAR = 2023, START_MONTH = 1;
const END_YEAR = 2027, END_MONTH = 3;
const PX_PER_MONTH = 110;
const PAD_LEFT = 80;

const totalMonths = (END_YEAR - START_YEAR)*12 + (END_MONTH - START_MONTH);
const CANVAS_W = PAD_LEFT + totalMonths * PX_PER_MONTH + 80;

function d2x(dateStr, isEnd) {
  const parts = dateStr.split('.').map(Number);
  const y = parts[0], m = parts[1];
  const hasDay = parts.length >= 3;
  // No day specified: start=1st, end=last day (add 1 full month)
  // Day specified: use day fraction within month
  const extra = (isEnd && !hasDay) ? 1 : 0;
  const dayFrac = hasDay ? (parts[2] - 1) / 30 : 0;
  return PAD_LEFT + ((y - START_YEAR)*12 + (m - START_MONTH) + extra + dayFrac) * PX_PER_MONTH;
}

// ── Layout constants ──
// Paper zone above experience bars
const PAPER_CARD_W = 155;
const PAPER_CARD_H = 44;
const PAPER_GAP = 5;
const PAPER_ZONE_TOP = 20;
// Experience tracks below paper zone (adjusted after papers are laid out)
let EXP_Y_BASE = 320; // will be recalculated
const EXP_TRACK_H = 72;
const BAR_H = 36;
// Education & axis (recalculated after EXP_Y_BASE)
let EDU_Y, AXIS_Y;
function recalcLayout() {
  EDU_Y = EXP_Y_BASE + 4 * EXP_TRACK_H + 10;
  AXIS_Y = EDU_Y + 56;
}

// ── Education (backbone) ──
const education = [
  { id:'cau', start:'2023.01', end:'2025.08.31', startNote:'(Sophomore)', label:'Chung-Ang University, B.S. Mathematics & Next-Gen Semiconductor', color:'#2155A4', logo:'images/CAU.png' },
  { id:'kaist', start:'2025.09', end:'2027.02', label:'KAIST, M.S., Ph.D. Integrated, Kim Jaechul Graduate School of AI at Korea Advanced Institute of Science and Technology (KAIST AI)', color:'#004187', logo:'images/kaist.png' },
];

// ── Experiences ──
// track: 0=directly below edu, 1=next, etc.
const experiences = [
  { id:'snu', start:'2023.03', end:'2024.11', title:'Undergrad Intern with Prof. Nam-Joon Kim', org:'Seoul National University',
    desc:'Speech AI team with visiting Assoc. Prof. Nam-Joon Kim (alumni from Prof. Hyuk-Jae Lee). Co-researched with Seungmin Bae.',
    color:'#0F0F70', track:0, logo:'images/snu.png' },
  { id:'nvidia', start:'2023.03', end:'2024.11', title:'Joint Research with NVIDIA Hyungon Ryu, NVIDIA Korea lead', org:'NVIDIA',
    desc:'Collaborated with Hyungon Ryu (Director, NVIDIA) on ASR and Speech AI research.',
    color:'#76B900', track:1, logo:'images/Nvidia_logo.svg.png' },
  { id:'neowine', start:'2023.07', end:'2023.08', title:'Research Intern', org:'Neowine Semiconductor circuit design team',
    desc:'Reviewing lecture materials for circuit design course using ChatGPT with Prof. Sang-ho Kim from Seoul National University.',
    color:'#7c6bc4', track:2 },
  { id:'nlp', start:'2024.06', end:'2024.08', title:'Study NLP (CS224n)', org:'CAU, Prof. Hwanhee Lee LILAB',
    desc:'Natural Language Processing study with Prof. Hwan-hee Lee, Dept. of AI.',
    color:'#2155A4', track:2, logo:'images/CAU.png' },
  { id:'measure', start:'2024.06', end:'2024.08', title:'Study Measure Theory', org:'CAU, Prof. Young-hoon Hong',
    desc:'With Prof. Young-hoon Hong, Dept. of Mathematics.',
    color:'#2155A4', track:3, logo:'images/CAU.png' },
  { id:'dram', start:'2024.11', end:'2024.12', title:'Study DRAM Circuit Design', org:'CAU, Prof. Donghyeon Han',
    desc:'With Prof. Donghyeon Han, Dept. of EE.',
    color:'#2155A4', track:3, logo:'images/CAU.png' },
  { id:'kaist_intern', start:'2025.01', end:'2025.08', title:'Undergrad Intern', org:'KAIST AI, Prof. Jaegul Choo, DAVIAN Lab',
    desc:'Prof. Jaegul Choo.',
    color:'#004187', track:0, logo:'images/kaist.png' },
  { id:'opennn', start:'2025.01', end:'2025.08', title:'Open Research Team Lead', org:'OpenNN',
    desc:'Open Researcher, leading by Daniel Yun. Research Area: NLP & Theory.',
    color:'#444444', track:2 },
  { id:'krafton', start:'2025.06', end:'2025.08', title:'DL Research Engineer Intern', org:'KRAFTON AI',
    desc:'Deep Learning Div., AI Audio Gen Team. Advised by Taehong Moon. Built dataset & preprocessing pipeline for TTS and SLM/ALM.',
    color:'#f9423a', track:1, logo:'images/KRAFTON.png' },
  { id:'naver', start:'2025.10', end:'2026.04.13', title:'WBL Project Residency', org:'NAVER Cloud Foundation Research Team',
    desc:'WBL (World Best Language model) project. Evaluating omni-model, data engineering in AudioLM & full-duplex model, researching continuous audio encoder.',
    color:'#00D25A', track:0, logo:'images/navercloud.svg', logoSm:true },
  { id:'qualcomm', start:'2026.04.20', end:'2026.10', title:'Speech AI Research Intern', org:'Qualcomm AI Research',
    desc:'Speech AI Research.',
    color:'#3253DC', track:0, logo:'images/qualcomm.png' },
];

// ── Papers ──
const papers = [
  { date:'2024.01', title:'Improving ASR Performance with OCR Through Using Word Frequency Difference', venue:'IEEE ICEIC 2024 (oral)', kw:'top', url:'https://doi.org/10.1109/ICEIC61013.2024.10457220', exp:'snu', sharedExp:'nvidia' },
  { date:'2024.02', title:'Enhancing ASR Performance through Relative Word Frequency in OCR and Normal Word Frequency Analysis', venue:'IEEE AICAS 2024 (oral)', kw:'top', url:'https://doi.org/10.1109/AICAS59952.2024.10595962', exp:'snu', sharedExp:'nvidia' },
  { date:'2024.05', title:'Matrix Decomposition and Transformation for AI Semiconductors', venue:'IEIE Summer 2024', kw:'misc', url:'https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE11890778', exp:'snu', sharedExp:'nvidia' },
  { date:'2024.07', title:'MathSpeech: Leveraging Small LMs for Accurate Conversion in Mathematical Speech-to-Formula', venue:'AAAI 2025 (23.5% acc.)', kw:'top', url:'https://arxiv.org/abs/2412.15655', exp:'snu', sharedExp:'nvidia' },
  { date:'2024.08', title:'MathBridge: Translating Spoken Math Expressions into LaTeX', venue:'arXiv preprint', kw:'misc', url:'https://arxiv.org/abs/2408.07081', exp:'snu', sharedExp:'nvidia' },
  { date:'2024.08', title:'Enhancing ASR via OCR Word Frequency: Theoretical Foundations', venue:'ICCE 2025 (oral)', kw:'top', url:'https://arxiv.org/abs/2405.02995', exp:'snu', sharedExp:'nvidia' },
  { date:'2024.09', title:'TeXBLEU: Automatic Metric for Evaluate LaTeX Format', venue:'ICASSP 2025 (oral)', kw:'top', url:'https://arxiv.org/abs/2409.06639', exp:'snu', sharedExp:'nvidia' },
  { date:'2024.10', title:'MathReader: Text-to-Speech for Mathematical Documents', venue:'ICASSP 2025 (oral)', kw:'top', url:'https://arxiv.org/abs/2501.07088', exp:'snu', sharedExp:'nvidia' },
  { date:'2024.10', title:'Analysis of GPT-3 Transformer Decoder Architecture', venue:'IEIE Fall 2024', kw:'misc', url:'https://www.researchgate.net/publication/384690504', exp:'snu', sharedExp:'nvidia' },
  { date:'2024.10', title:'Transformer Decoder & KV Cache Behavior During LLM Inference', venue:'ICEIC 2025', kw:'misc', url:null, exp:'snu', sharedExp:'nvidia' },
  { date:'2024.11', title:'Enhanced SiC Double-Trench MOSFETs', venue:'ICCE-Asia 2024', kw:'misc', url:'https://www.researchgate.net/publication/383794342', exp:'edu_cau' },
  { date:'2024.01', title:'Enhancing ASR & TTS with LLM for Accessible Math Learning', venue:'NVIDIA GTC 2025 poster', kw:'misc', url:'https://www.researchgate.net/publication/387274077', exp:'snu', sharedExp:'nvidia' },
  { date:'2025.05', title:'Talk to Your Slides: Slide Editing via Language-Driven Structured Data', venue:'arXiv preprint', kw:'misc', url:'https://arxiv.org/abs/2505.11604', exp:'kaist_intern' },
  { date:'2025.07', title:'Delving into LLMs for Effective Time-Series Anomaly Detection', venue:'NeurIPS 2025', kw:'top', url:'https://openreview.net/forum?id=6rpy7X1Of8', exp:'kaist_intern', sharedExp:'krafton' },
  { date:'2025.05', title:'FFT-Based Spectral & Temporal Gradient Filtering for DP', venue:'CIKM 2025 Workshop', kw:'top', url:'https://arxiv.org/abs/2505.04468', exp:'opennn' },
  { date:'2026.01', title:'HyperCLOVA X 32B Think', venue:'arXiv (NAVER Cloud)', kw:'misc', url:'https://arxiv.org/abs/2601.03286', exp:'naver' },
  { date:'2026.01', title:'HyperCLOVA X 8B Omni', venue:'arXiv (NAVER Cloud)', kw:'misc', url:'https://arxiv.org/abs/2601.01792', exp:'naver' },
  { date:'2026.03', title:'OmniACBench: Benchmark for Acoustic Control in Omni-Modal Models', venue:'ARR March submitted', kw:'top', url:'https://arxiv.org/abs/2603.23938', exp:'naver' },
  { date:'2026.03', title:'SOMMELIER: Scalable Open Multi-turn Audio Pre-processing for Full-duplex SLMs', venue:'ACL Industry 2026 submitted', kw:'top', url:'https://arxiv.org/abs/2603.25750', exp:'naver' },
  { date:'2026.03', title:'SNAP: Speaker Nulling for Artifact Projection in Speech Deepfake Detection', venue:'INTERSPEECH 2026 submitted', kw:'top', url:'https://arxiv.org/abs/2603.20686', exp:'naver' },
  { date:'2026.03', title:'SLICE: Speech Enhancement via Layer-wise Injection of Conditioning Embeddings', venue:'INTERSPEECH 2026 submitted', kw:'top', url:'https://arxiv.org/abs/2603.05302', exp:'edu_kaist' },
];

// ── Render ──
const canvas = document.getElementById('timelineCanvas');
canvas.style.width = CANVAS_W + 'px';

// ── Step 1: Split papers into above (experience) and below (education) ──
const allPapers = papers.map((p, i) => ({ ...p, idx: i, x: d2x(p.date) }));
const abovePapers = allPapers.filter(p => !p.exp.startsWith('edu_')).sort((a, b) => a.x - b.x || a.idx - b.idx);
const belowPapers = allPapers.filter(p => p.exp.startsWith('edu_')).sort((a, b) => a.x - b.x || a.idx - b.idx);

// Collision-free row assignment helper
function assignRows(pList, cardW, gap) {
  const rows = [];
  pList.forEach(p => {
    const left = p.x - cardW / 2;
    const right = left + cardW + gap;
    let placed = false;
    for (let r = 0; r < rows.length; r++) {
      if (!rows[r].some(seg => !(right <= seg.left || left >= seg.right))) {
        rows[r].push({ left, right });
        p.row = r;
        placed = true;
        break;
      }
    }
    if (!placed) {
      p.row = rows.length;
      rows.push([{ left, right }]);
    }
  });
  return rows.length;
}

const numAboveRows = assignRows(abovePapers, PAPER_CARD_W, PAPER_GAP);
const numBelowRows = assignRows(belowPapers, PAPER_CARD_W, PAPER_GAP);

// Papers above grow upward from experience bars
const aboveZoneHeight = numAboveRows * (PAPER_CARD_H + PAPER_GAP);
EXP_Y_BASE = PAPER_ZONE_TOP + aboveZoneHeight + 30;
recalcLayout();

// ── Step 2: Draw everything ──

// Axis
const axis = document.createElement('div');
axis.className = 'time-axis';
axis.style.top = AXIS_Y + 'px';
canvas.appendChild(axis);

// Row labels
[{ label: 'Experience', y: EXP_Y_BASE + 10 },
 { label: 'Education', y: EDU_Y + 10 }].forEach(r => {
  const el = document.createElement('div');
  el.className = 'row-label';
  el.style.top = r.y + 'px';
  el.textContent = r.label;
  canvas.appendChild(el);
});

// Year & quarter markers
for (let y = START_YEAR; y <= END_YEAR; y++) {
  for (let q = 0; q < 4; q++) {
    const m = q * 3 + 1;
    if (y === END_YEAR && m > END_MONTH) break;
    const x = d2x(`${y}.${String(m).padStart(2,'0')}`);
    if (q === 0) {
      const el = document.createElement('div');
      el.className = 'year-marker';
      el.style.left = x + 'px';
      el.style.top = (AXIS_Y - 8) + 'px';
      el.innerHTML = `<div class="tick"></div><div class="label">${y}</div>`;
      canvas.appendChild(el);
      if (y >= 2024 && y <= 2026) {
        const line = document.createElement('div');
        line.style.cssText = `position:absolute;left:${x}px;top:0;width:1px;height:${AXIS_Y}px;background:rgba(0,0,0,0.07);z-index:0;`;
        canvas.appendChild(line);
      }
    } else {
      const el = document.createElement('div');
      el.className = 'quarter-marker';
      el.style.left = x + 'px';
      el.style.top = (AXIS_Y - 3) + 'px';
      canvas.appendChild(el);
    }
  }
}

// Education backbone bars (store positions for paper stems)
const expBarPositions = {};
education.forEach(edu => {
  const x1 = d2x(edu.start, false);
  const x2 = d2x(edu.end, true);
  expBarPositions['edu_' + edu.id] = { x1, x2, y: EDU_Y, color: edu.color };
  const bar = document.createElement('div');
  bar.className = 'edu-bar';
  bar.style.left = x1 + 'px';
  bar.style.width = (x2 - x1) + 'px';
  bar.style.top = EDU_Y + 'px';
  bar.style.background = edu.color;
  if (edu.logo) {
    const img = document.createElement('img'); img.className = 'bar-logo'; img.src = edu.logo; img.alt = ''; bar.appendChild(img);
  }
  const eduLabel = document.createElement('span');
  eduLabel.textContent = edu.label;
  bar.appendChild(eduLabel);
  const ds = document.createElement('span'); ds.className = 'bar-date start'; ds.textContent = edu.start + (edu.startNote ? ' ' + edu.startNote : ''); bar.appendChild(ds);
  const de = document.createElement('span'); de.className = 'bar-date end'; de.textContent = edu.end; bar.appendChild(de);
  canvas.appendChild(bar);
});

// Experience bars
experiences.forEach(exp => {
  const x1 = d2x(exp.start, false);
  const x2 = d2x(exp.end, true);
  const y = EXP_Y_BASE + exp.track * EXP_TRACK_H;
  expBarPositions[exp.id] = { x1, x2, y, color: exp.color, track: exp.track };

  const bar = document.createElement('div');
  bar.className = 'exp-bar';
  bar.style.left = x1 + 'px';
  bar.style.width = Math.max(x2 - x1, 70) + 'px';
  bar.style.top = y + 'px';
  bar.style.background = exp.color;
  bar.style.boxShadow = `0 2px 8px ${exp.color}22`;

  if (exp.logo) {
    const img = document.createElement('img');
    img.className = 'bar-logo' + (exp.logoSm ? ' logo-sm' : '') + (exp.logoNoFilter ? ' logo-no-filter' : '');
    img.src = exp.logo; img.alt = '';
    bar.appendChild(img);
  }
  const label = document.createElement('span');
  label.textContent = `${exp.org} — ${exp.title}`;
  label.style.cssText = 'overflow:hidden;text-overflow:ellipsis';
  bar.appendChild(label);
  const fmtDate = s => s.split('.').slice(0,2).join('.');
  const ds = document.createElement('span'); ds.className = 'bar-date start'; ds.textContent = fmtDate(exp.start); bar.appendChild(ds);
  const de = document.createElement('span'); de.className = 'bar-date end'; de.textContent = fmtDate(exp.end); bar.appendChild(de);

  // Connector to axis
  const conn = document.createElement('div');
  conn.className = 'connector';
  conn.style.left = (x1 + 16) + 'px';
  conn.style.top = (y + BAR_H) + 'px';
  conn.style.height = (AXIS_Y - y - BAR_H) + 'px';
  conn.style.background = `${exp.color}33`;
  canvas.appendChild(conn);

  bar.addEventListener('mouseenter', e => showExpTooltip(e, exp));
  bar.addEventListener('mousemove', moveTooltip);
  bar.addEventListener('mouseleave', hideTooltip);
  canvas.appendChild(bar);
});

// ── Paper cards ──
const STEM_SHIFT = 5;
const aboveBottomY = EXP_Y_BASE - 24;
const belowTopY = AXIS_Y + 24;

function renderPaper(p, cardY, stemDir) {
  const xShift = p.row * STEM_SHIFT;
  const stemX = p.x + xShift;
  const cardX = stemX - PAPER_CARD_W / 2;

  const card = document.createElement('div');
  card.className = `paper-card ${p.kw}`;
  card.style.left = cardX + 'px';
  card.style.top = cardY + 'px';
  card.style.width = PAPER_CARD_W + 'px';
  card.innerHTML = `
    <div class="pc-title">${p.title}</div>
    <div class="pc-venue">${p.venue}</div>
  `;
  card.addEventListener('mouseenter', e => showPaperTooltip(e, p));
  card.addEventListener('mousemove', moveTooltip);
  card.addEventListener('mouseleave', hideTooltip);
  if (p.url) card.addEventListener('click', () => window.open(p.url, '_blank'));
  canvas.appendChild(card);

  // Stem to primary bar
  const expPos = expBarPositions[p.exp];
  if (expPos) {
    const top = stemDir === 'up' ? (cardY + PAPER_CARD_H) : (expPos.y + BAR_H);
    const bottom = stemDir === 'up' ? expPos.y : cardY;
    const stem = document.createElement('div');
    stem.className = 'paper-stem';
    stem.style.left = stemX + 'px';
    stem.style.top = top + 'px';
    stem.style.height = (bottom - top) + 'px';
    stem.style.background = `${expPos.color}88`;
    canvas.appendChild(stem);
  }

  // Shared bar connector
  if (p.sharedExp) {
    const shared = expBarPositions[p.sharedExp];
    if (shared) {
      const top = stemDir === 'up' ? (cardY + PAPER_CARD_H) : (shared.y + BAR_H);
      const bottom = stemDir === 'up' ? shared.y : cardY;
      const stem2 = document.createElement('div');
      stem2.className = 'paper-stem';
      stem2.style.left = (stemX + 6) + 'px';
      stem2.style.top = top + 'px';
      stem2.style.height = (bottom - top) + 'px';
      stem2.style.background = `${shared.color}66`;
      canvas.appendChild(stem2);
    }
  }
}

// Above papers (experience connections)
abovePapers.forEach(p => {
  const cardY = aboveBottomY - (p.row + 1) * (PAPER_CARD_H + PAPER_GAP);
  renderPaper(p, cardY, 'up');
});

// Middle papers (education connections) — between experience and education bars
const middleTopY = EDU_Y - (numBelowRows) * (PAPER_CARD_H + PAPER_GAP) - 20;
belowPapers.forEach(p => {
  const cardY = middleTopY + p.row * (PAPER_CARD_H + PAPER_GAP);
  renderPaper(p, cardY, 'down');
});

canvas.style.minHeight = (AXIS_Y + 60) + 'px';

// ── Tooltip ──
const tooltip = document.getElementById('tooltip');

function showExpTooltip(e, exp) {
  tooltip.innerHTML = `
    <div class="tt-title">${exp.title}</div>
    <div class="tt-org">${exp.org}</div>
    <div class="tt-date">${exp.start} — ${exp.end}</div>
    ${exp.desc ? `<div class="tt-desc">${exp.desc}</div>` : ''}
  `;
  tooltip.classList.add('show');
  moveTooltip(e);
}

function showPaperTooltip(e, p) {
  tooltip.innerHTML = `
    <div class="tt-tag ${p.kw}">${p.kw === 'top' ? 'Top Venue' : 'Publication'}</div>
    <div class="tt-paper-title">${p.title}</div>
    <div class="tt-venue ${p.kw}">${p.venue}</div>
    <div class="tt-date">${p.date}</div>
    ${p.url ? `<div class="tt-link">Click to open &rarr;</div>` : ''}
  `;
  tooltip.classList.add('show');
  moveTooltip(e);
}

function moveTooltip(e) {
  let x = e.clientX + 14, y = e.clientY + 14;
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  if (x + tw > window.innerWidth - 10) x = e.clientX - tw - 14;
  if (y + th > window.innerHeight - 10) y = e.clientY - th - 14;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() { tooltip.classList.remove('show'); }

// ── Mouse wheel → horizontal scroll (anywhere on page) ──
const wrapper = document.getElementById('timelineWrapper');
document.addEventListener('wheel', e => {
  e.preventDefault();
  // Use both deltaX and deltaY so trackpad and mouse wheel both work
  const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
  wrapper.scrollLeft += delta * 1.5;
}, { passive: false });

// ── Drag to scroll ──
let isDrag = false, startX, scrollL;
wrapper.addEventListener('mousedown', e => {
  if (e.target.closest('.paper-card,.exp-bar')) return;
  isDrag = true; startX = e.pageX; scrollL = wrapper.scrollLeft;
  document.body.style.cursor = 'grabbing';
});
document.addEventListener('mousemove', e => {
  if (!isDrag) return;
  e.preventDefault();
  wrapper.scrollLeft = scrollL - (e.pageX - startX);
});
document.addEventListener('mouseup', () => { isDrag = false; document.body.style.cursor = ''; });

// Scroll to 2024 on load
wrapper.scrollLeft = d2x('2023.10') - 200;
</script>
